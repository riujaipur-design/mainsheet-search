// Listen for updates
onValue(ref(db,'mainsheet/data'), snap=>{
  const d=snap.val();
  if(d){ MAIN=d; document.getElementById('tc').textContent=MAIN.length+' coils'; search(); }
  setStatus('🟢 Live','#4ade80');
});

function setStatus(t,c){const el=document.getElementById('ld');if(el){el.textContent=t;el.style.color=c;}}

// Upload Excel
window.upload=function(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const mn=wb.SheetNames.find(s=>s.toUpperCase().includes('MAIN'));
      if(!mn){alert('MAIN SHEET nahi mila!');return;}
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[mn],{raw:false,defval:null});
      const newMain=raw.map(r=>({
        coil: str(r['Coil No.']||''),
        spec: str(r['Specification']||''),
        thick:pf(r['Thick In Mm']),
        width:pf(r['Width In Mm']),
        len:  pf(r['LENGTH']||r['length']),
        qty:  pf(r['Qty. In M.T.']),
        bw:   pf(r['Balance Weight']),
        grade:str(r['GRADE']||r['Grade']||''),
        make: str(r['Make']||''),
        date: str(r['DATE']||r['Date']||''),
        firm: str(r['COMPANY NAME']||''),
        shape:str(r['SHAPE']||''),
        from: str(r['FROM RECEIVED']||''),
        cp:   pf(r['C%']),
        ys:   pf(r['YS']),
        uts:  pf(r['UTS']),
        tcw:  pf(r['total cutting weight']),
        abal: pf(r['actul balance coil shape']),
        cuts: buildCuts(r),
      }));
      setStatus('⏳ Uploading...','#f59e0b');
      set(ref(db,'mainsheet/data'), cleanFB(newMain)).then(()=>{
        setStatus('🟢 Live','#4ade80');
        alert('✅ Update ho gaya! Sabko dikh jayega.');
      });
      document.getElementById('fi').value='';
    }catch(e){alert('Error: '+e.message);}
  };
  r.readAsArrayBuffer(f);
};

function buildCuts(r){
  const cws=[pf(r['cutting weight1']),pf(r['cutting weight2']),pf(r['cutting weight3']),pf(r['cutting weight4'])];
  const slots=[
    [pf(r['CUTTING SIZE']||r['cutting size']),pf(r['BALANCE']||r['Balance'])],
    [pf(r['A']),pf(r['A1'])],[pf(r['B']),pf(r['B2'])],
    [pf(r['C']),pf(r['C2'])],[pf(r['D']),pf(r['D2'])]
  ];
  const cuts=[];let ci=0;
  slots.forEach(([sz,pc])=>{
    if(sz&&sz>0&&pc&&pc>0){
      if(!cuts.some(c=>Math.abs(c.sz-sz)<0.1)) cuts.push({sz,pc:parseInt(pc),wt:cws[ci]});
      ci++;
    }
  });
  return cuts.length?cuts:undefined;
}
function cleanFB(o){
  if(Array.isArray(o)) return o.map(cleanFB);
  if(o&&typeof o==='object') return Object.fromEntries(Object.entries(o).filter(([,v])=>v!==null&&v!==undefined&&v===v).map(([k,v])=>[k,cleanFB(v)]));
  return o;
}
function str(v){return v!=null?String(v):'';}
function pf(v){if(v==null||v==='')return null;const n=parseFloat(str(v).replace(/,/g,''));return isNaN(n)?null:n;}
function n2(v){return(v!=null&&v!==''&&!isNaN(+v))?(+v).toFixed(2):'-';}
function n3(v){return(v!=null&&v!==''&&!isNaN(+v))?(+v).toFixed(3):'-';}
function sc(s){if(!s)return'sO';const u=s.toUpperCase();if(u.startsWith('HR'))return'sHR';if(u.startsWith('CR'))return'sCR';if(u.includes('PLATE'))return'sPL';return'sO';}

// ── Card builder ──────────────────────────────────────────────────────
function card(r){
  const bw = r.bw!=null?+r.bw:0;
  const qty = r.qty!=null?+r.qty:null;
  const pct = (qty&&qty>0)?Math.min(100,(bw/qty)*100):0;
  const tcw  = r.tcw!=null?+r.tcw:null;
  const abal = r.abal!=null?+r.abal:null;

  // Mill cert row
  const mill=(r.cp||r.ys||r.uts)?`
    <div class="mill">
      <span class="mp"><span class="mk">C%</span><span class="mv">${r.cp!=null?n3(r.cp):'—'}</span></span>
      <span class="md">|</span>
      <span class="mp"><span class="mk">YS</span><span class="mv">${r.ys!=null?n2(r.ys):'—'}</span></span>
      <span class="md">|</span>
      <span class="mp"><span class="mk">UTS</span><span class="mv">${r.uts!=null?n2(r.uts):'—'}</span></span>
    </div>`:'';

  // Weight boxes
  const wt=`
    <div class="wgrid3">
      <div class="wb"><div class="wl">Original Qty</div><div class="wv wo">${qty!=null?n2(qty)+' MT':'—'}</div></div>
      <div class="wb"><div class="wl">Balance MT</div><div class="wv ${bw>0?'wg':'wr'}">${n2(bw)}</div></div>
      <div class="wb"><div class="wl">Pcs Weight</div><div class="wv wp">${tcw!=null?n2(tcw)+' MT':'—'}</div></div>
    </div>
    <div class="wgrid2">
      <div class="wb"><div class="wl">Actual Balance</div><div class="wv ${abal!=null&&abal>=0?'wa':'wr'}">${abal!=null?n2(abal)+' MT':'—'}</div></div>
      <div class="wb"><div class="wl">Progress</div>
        <div style="margin-top:6px">
          <div class="pw"><div class="pb${pct<20?' dng':''}" style="width:${pct}%"></div></div>
          <div style="font-size:.7rem;color:#64748b;text-align:center">${pct.toFixed(1)}% remaining</div>
        </div>
      </div>
    </div>`;

  // Cutting chips
  const chips=r.cuts&&r.cuts.length?`
    <div class="cs">
      <div class="ct">Cutting Sizes</div>
      <div class="cc">${r.cuts.map(c=>`<span class="chip">${c.sz}mm <span class="cpc">${c.pc}pcs</span>${c.wt?` <span class="cwt">${n2(c.wt)}MT</span>`:''}</span>`).join('')}</div>
    </div>`:'';

  return `<div class="card">
    <div class="ch">
      <span class="cno">● ${r.coil||'-'}</span>
      <span class="sbg ${sc(r.spec)}">${r.spec||'N/A'}</span>
    </div>
    <div class="cb">
      <div class="ir">
        <span class="ip"><span class="k">Thick</span><span class="v">${r.thick!=null?r.thick+'mm':'-'}</span></span>
        <span class="ip"><span class="k">Width</span><span class="v">${r.width!=null?r.width+'mm':'-'}</span></span>
        <span class="ip"><span class="k">Length</span><span class="v">${r.len&&+r.len>0?r.len+'mm':'-'}</span></span>
        <span class="ip"><span class="k">Grade</span><span class="v">${r.grade||'-'}</span></span>
        <span class="ip"><span class="k">Make</span><span class="v">${r.make||'-'}</span></span>
        <span class="ip"><span class="k">Date</span><span class="v">${r.date||'-'}</span></span>
        <span class="ip"><span class="k">Shape</span><span class="v">${r.shape||'-'}</span></span>
        <span class="ip"><span class="k">From</span><span class="v">${r.from||'-'}</span></span>
      </div>
      ${mill}
      ${wt}
      ${chips}
    </div>
  </div>`;
}

// ── Search ────────────────────────────────────────────────────────────
window.search=function(){
  const cq  = document.getElementById('fc').value.trim().toUpperCase();
  const sq  = document.getElementById('fsp').value.trim().toUpperCase();
  const tmn = pf(document.getElementById('ftmn').value);
  const tmx = pf(document.getElementById('ftmx').value);
  const wmn = pf(document.getElementById('fwmn').value);
  const wmx = pf(document.getElementById('fwmx').value);
  const lmn = pf(document.getElementById('flmn').value);
  const lmx = pf(document.getElementById('flmx').value);
  const bmn = pf(document.getElementById('fbmn').value);
  const gq  = document.getElementById('fg2').value.trim().toUpperCase();

  const f=MAIN.filter(r=>{
    if(cq  && !str(r.coil).toUpperCase().includes(cq))        return false;
    if(sq  && !(r.spec||'').toUpperCase().includes(sq))        return false;
    if(tmn!=null&&(r.thick==null||+r.thick<tmn))               return false;
    if(tmx!=null&&(r.thick==null||+r.thick>tmx))               return false;
    if(wmn!=null&&(r.width==null||+r.width<wmn))               return false;
    if(wmx!=null&&(r.width==null||+r.width>wmx))               return false;
    if(lmn!=null&&(r.len==null||+r.len<lmn))                   return false;
    if(lmx!=null&&(r.len==null||+r.len>lmx))                   return false;
    if(bmn!=null&&(r.bw==null||+r.bw<bmn))                     return false;
    if(gq  && !(r.grade||'').toUpperCase().includes(gq))       return false;
    return true;
  });

  const tq=f.reduce((s,r)=>s+(+(r.qty)||0),0);
  const tb=f.reduce((s,r)=>s+(+(r.bw)||0),0);
  document.getElementById('rc').textContent=f.length;
  document.getElementById('rq').textContent=tq.toFixed(2);
  document.getElementById('rb').textContent=tb.toFixed(2);

  const g=document.getElementById('grid');
  if(!f.length){g.innerHTML=`<div class="empty"><div style="font-size:2.5rem">🔍</div>No coils found</div>`;return;}
  g.innerHTML=f.slice(0,200).map(card).join('');
  if(f.length>200) g.innerHTML+=`<div class="empty" style="padding:16px;color:#64748b">First 200 of ${f.length} — narrow filters</div>`;
};

window.reset=function(){
  ['fc','fg2'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fsp').value='';
  ['ftmn','ftmx','fwmn','fwmx','flmn','flmx','fbmn'].forEach(id=>document.getElementById(id).value='');
  search();
};

search();
</script>

<body>
<div class="hdr">
  <h1>📋 MAIN SHEET Search <span class="live" id="ld">⏳ Connecting...</span></h1>
  <div class="hdr-r">
    <span class="sbadge" id="tc">Loading...</span>
    <button class="ubtn" onclick="document.getElementById('fi').click()">📁 Upload Excel</button>
    <input type="file" id="fi" accept=".xlsx,.xls" onchange="upload(event)">
  </div>
</div>
<div class="flt">
  <div class="fg">
    <div><label>Coil No.</label><input type="text" id="fc" placeholder="Search..." oninput="search()"></div>
    <div><label>Specification</label>
      <select id="fsp" onchange="search()">
        <option value="">All</option><option>HR</option><option>CR</option><option>PLATE</option><option>CQ</option><option>SHEET</option>
      </select>
    </div>
    <div><label>Thick Min (mm)</label><input type="number" id="ftmn" placeholder="e.g. 2" step="0.1" oninput="search()"></div>
    <div><label>Thick Max (mm)</label><input type="number" id="ftmx" placeholder="e.g. 8" step="0.1" oninput="search()"></div>
    <div><label>Width Min (mm)</label><input type="number" id="fwmn" placeholder="e.g. 900" oninput="search()"></div>
    <div><label>Width Max (mm)</label><input type="number" id="fwmx" placeholder="e.g. 2000" oninput="search()"></div>
    <div><label>Length Min (mm)</label><input type="number" id="flmn" placeholder="e.g. 3000" oninput="search()"></div>
    <div><label>Length Max (mm)</label><input type="number" id="flmx" placeholder="e.g. 12000" oninput="search()"></div>
    <div><label>Balance Min (MT)</label><input type="number" id="fbmn" placeholder="e.g. 1" step="0.01" oninput="search()"></div>
    <div><label>Grade</label><input type="text" id="fg2" placeholder="IS2062..." oninput="search()"></div>
  </div>
  <div class="br">
    <button class="btn bp" onclick="search()">🔍 Search</button>
    <button class="btn br2" onclick="reset()">↺ Reset</button>
  </div>
</div>
<div class="rbar">
  Showing <span id="rc">0</span> coils &nbsp;|&nbsp;
  Total Qty: <span id="rq">0</span> MT &nbsp;|&nbsp;
  Balance: <span id="rb">0</span> MT
</div>
